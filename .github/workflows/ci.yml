name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # NOTE (audit TS-3): macOS is deliberately NOT in the matrix yet. The product
  # scripts are BSD-portable (stat -f %m fallbacks, gtimeout detection), but the
  # TEST fixtures are not (`touch -d @<epoch>` in stop-gate tests, bare `timeout`
  # in driver tests) — a macos-latest job would be red for test-infra reasons,
  # not product ones. Tracked as roadmap R45 follow-up: port the fixtures, then
  # add `os: [ubuntu-latest, macos-latest]`.
  test:
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']   # CLAUDE.md claims Node >= 20; run the floor, not just 22
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate plugin manifests
        run: |
          jq -e . .claude-plugin/plugin.json > /dev/null
          jq -e . .claude-plugin/marketplace.json > /dev/null
          jq -e . hooks/hooks.json > /dev/null
          echo "manifests: valid JSON"
          # Version-sync gate: plugin.json, both marketplace.json version fields,
          # and (on a tag push) the tag itself must all agree. Guards against the
          # v0.1.1 tag-without-manifest-bump desync that CI's JSON check missed.
          pv=$(jq -r '.version' .claude-plugin/plugin.json)
          mv_meta=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          mv_plugin=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          if [ "$pv" != "$mv_meta" ] || [ "$pv" != "$mv_plugin" ]; then
            echo "::error::version desync — plugin.json=$pv marketplace.metadata=$mv_meta marketplace.plugins[0]=$mv_plugin"
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag_ver="${GITHUB_REF_NAME#v}"
            if [ "$pv" != "$tag_ver" ]; then
              echo "::error::tag ${GITHUB_REF_NAME} does not match manifest version ${pv}"
              exit 1
            fi
          fi
          echo "manifests: version ${pv} consistent across plugin.json + marketplace.json${GITHUB_REF_TYPE:+ (ref ${GITHUB_REF_NAME})}"

      - name: Run test suite
        run: bash tests/run-all.sh

  # Schema-level manifest validation via the official CLI (JSON-valid != schema-
  # valid). Separate job so a registry/network hiccup in the CLI install is
  # immediately distinguishable from a product test failure.
  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: claude plugin validate
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude plugin validate .
